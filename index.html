<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Spanish Conjugation Trainer</title>
<style>
  body {
    font-family: Arial;
    padding: 10px;
    max-width: 600px;
    margin: auto;
    color: #FFFFFF;
    background-color: #151B45;
  }
  h1 { text-align: center; }
  input { padding: 10px; font-size: 18px; width: 100%; }
  button { padding: 10px; font-size: 18px; margin-top: 10px; }
  #feedback, #score { font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>

<h1>Spanish Conjugation Trainer</h1>
<p id="prompt"></p>

<input id="answer" type="text" autocomplete="off">
<p id="score">Score: 0/0</p>

<button onclick="speakSpanish(currentQuestion.correctAnswer)">🔊 Listen</button>
<button onclick="checkAnswer()">Submit</button>
<p id="feedback"></p>

<script>
// ===================== DATA =====================

// --- Verbs ---
const verbs = [
  { infinitive:"hablar", type:"ar" },
  { infinitive:"comer", type:"er" },
  { infinitive:"vivir", type:"ir" },
  { infinitive:"ir", type:"ir" },
  { infinitive:"ser", type:"ir" },
  { infinitive:"ver", type:"er" },
  { infinitive:"tener", type:"er" },
  { infinitive:"hacer", type:"er" },
  { infinitive:"venir", type:"ir" },
  { infinitive:"decir", type:"ir" },

  // NEW VERBS
  { infinitive:"estar", type:"ar" },
  { infinitive:"poder", type:"er" },
  { infinitive:"querer", type:"er" },
  { infinitive:"saber", type:"er" },
  { infinitive:"poner", type:"er" },
  { infinitive:"llevar", type:"ar" }
];

// --- Pronouns ---
const pronouns = ["I","You","He/She","We","You (pl.)","They"];

// --- Context triggers ---
const contextHints = {
  imperfect: [
    "when I was young",
    "at that time",
    "usually",
    "every day",
    "while that was happening"
  ],
  preterite: [
    "yesterday",
    "last night",
    "once",
    "suddenly",
    "for two years"
  ]
};

// --- English prompts (with tense meaning baked in) ---
const englishTenses = {
  ser: {
    present:["am","are","is","are","are","are"],
    imperfect:["was (ongoing)","were (ongoing)","was (ongoing)","were (ongoing)","were (ongoing)","were (ongoing)"],
    preterite:["was (completed)","were (completed)","was (completed)","were (completed)","were (completed)","were (completed)"]
  },
  estar: {
    present:["am","are","is","are","are","are"],
    imperfect:["was (temporary)","were (temporary)","was (temporary)","were (temporary)","were (temporary)","were (temporary)"],
    preterite:["was (change)","were (change)","was (change)","were (change)","were (change)","were (change)"]
  },
  poder: {
    present:["can","can","can","can","can","can"],
    imperfect:["could (ongoing)","could (ongoing)","could (ongoing)","could (ongoing)","could (ongoing)","could (ongoing)"],
    preterite:["could (once)","could (once)","could (once)","could (once)","could (once)","could (once)"]
  },
  querer: {
    present:["want","want","wants","want","want","want"],
    imperfect:["wanted (ongoing)","wanted (ongoing)","wanted (ongoing)","wanted (ongoing)","wanted (ongoing)","wanted (ongoing)"],
    preterite:["tried to","tried to","tried to","tried to","tried to","tried to"]
  },
  saber: {
    present:["know","know","knows","know","know","know"],
    imperfect:["knew","knew","knew","knew","knew","knew"],
    preterite:["found out","found out","found out","found out","found out","found out"]
  },
  poner: {
    present:["put","put","puts","put","put","put"],
    imperfect:["was putting","were putting","was putting","were putting","were putting","were putting"],
    preterite:["put","put","put","put","put","put"]
  },
  llevar: {
    present:["carry","carry","carries","carry","carry","carry"],
    imperfect:["was carrying","were carrying","was carrying","were carrying","were carrying","were carrying"],
    preterite:["carried","carried","carried","carried","carried","carried"]
  }
};

// ===================== LOGIC =====================

const tenses = ["present","imperfect","preterite"];
let currentQuestion = null;
let correct = 0, total = 0;

function random(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function stripAccents(s){ return s.normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

// --- Spanish conjugation (minimal, focused) ---
function conjugate(v, tense, p){
  const stems = {
    ser:{imperfect:["era","eras","era","éramos","erais","eran"], preterite:["fui","fuiste","fue","fuimos","fuisteis","fueron"]},
    estar:{imperfect:["estaba","estabas","estaba","estábamos","estabais","estaban"], preterite:["estuve","estuviste","estuvo","estuvimos","estuvisteis","estuvieron"]},
    poder:{preterite:["pude","pudiste","pudo","pudimos","pudisteis","pudieron"]},
    querer:{preterite:["quise","quisiste","quiso","quisimos","quisisteis","quisieron"]},
    saber:{preterite:["supe","supiste","supo","supimos","supisteis","supieron"]},
    poner:{preterite:["puse","pusiste","puso","pusimos","pusisteis","pusieron"]}
  };

  if(stems[v.infinitive]?.[tense]) return stems[v.infinitive][tense][p];

  const endings = {
    present:{ar:["o","as","a","amos","áis","an"], er:["o","es","e","emos","éis","en"], ir:["o","es","e","imos","ís","en"]},
    imperfect:{ar:["aba","abas","aba","ábamos","abais","aban"], er:["ía","ías","ía","íamos","íais","ían"], ir:["ía","ías","ía","íamos","íais","ían"]},
    preterite:{ar:["é","aste","ó","amos","asteis","aron"], er:["í","iste","ió","imos","isteis","ieron"], ir:["í","iste","ió","imos","isteis","ieron"]}
  };

  return v.infinitive.slice(0,-2) + endings[tense][v.type][p];
}

// --- Generate question ---
function newQuestion(){
  const verb = random(verbs);
  const tense = random(tenses);
  const p = Math.floor(Math.random()*6);
  const context = tense !== "present" ? " " + random(contextHints[tense]) : "";

  const english = `${pronouns[p]} ${englishTenses[verb.infinitive]?.[tense]?.[p] || ""}${context}`;
  const answer = conjugate(verb, tense, p);

  currentQuestion = { answer };
  document.getElementById("prompt").innerText = english;
  document.getElementById("answer").value = "";
  document.getElementById("feedback").innerText = "";
}

// --- Check ---
function checkAnswer(){
  const input = stripAccents(document.getElementById("answer").value.trim().toLowerCase());
  const correctAnswer = stripAccents(currentQuestion.answer);

  total++;
  if(input.endsWith(correctAnswer)){
    correct++;
    document.getElementById("feedback").innerText = "Correct!";
  } else {
    document.getElementById("feedback").innerText = `Correct: ${currentQuestion.answer}`;
  }

  document.getElementById("score").innerText = `Score: ${correct}/${total}`;
  speakSpanish(currentQuestion.answer);
  setTimeout(newQuestion, 1200);
}

// --- Speech ---
function speakSpanish(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "es-ES";
  speechSynthesis.speak(u);
}

document.getElementById("answer").addEventListener("keydown",e=>{
  if(e.key==="Enter") checkAnswer();
});

newQuestion();
</script>

</body>
</html>
