<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Spanish Conjugation Trainer</title>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 10px;
    max-width: 600px;
    margin: auto;
    color: #FFFFFF;
    background-color: #151B45;
  }
  h1 { text-align: center; }
  #input-container { display: flex; flex-direction: column; gap: 10px; }
  input { padding: 10px; font-size: 18px; }
  button { padding: 10px; font-size: 18px; margin-top: 10px; }
  #feedback { margin-top: 10px; font-weight: bold; }
  #score { font-weight: bold; }
</style>
</head>

<body>
<h1>Spanish Conjugation Trainer</h1>
<p id="prompt"></p>

<div id="input-container">
  <input id="answer" type="text" autocomplete="off">
  <p id="score">Score: 0/0</p>
</div>

<button type="button" onclick="speakSpanish(currentQuestion.correctAnswer)">🔊 Listen</button>
<button onclick="checkAnswer()">Submit</button>

<p id="feedback"></p>

<script>
// ---------------- DATA ----------------

const verbs = [
  { infinitive:"hablar", type:"ar", english:"speak" },
  { infinitive:"comer", type:"er", english:"eat" },
  { infinitive:"vivir", type:"ir", english:"live" },
  { infinitive:"ir", type:"ir", english:"go" },
  { infinitive:"ser", type:"irregular", english:"be (identity)" },
  { infinitive:"estar", type:"irregular", english:"be (state/location)" },
  { infinitive:"ver", type:"er", english:"see" },
  { infinitive:"tener", type:"er", english:"have" },
  { infinitive:"hacer", type:"er", english:"do/make" },
  { infinitive:"venir", type:"ir", english:"come" },
  { infinitive:"decir", type:"ir", english:"say/tell" }
];

const pronouns = [
  { spanish:"yo", english:"I" },
  { spanish:"tú", english:"You (sing.)" },
  { spanish:"él/ella", english:"He/She" },
  { spanish:"nosotros", english:"We" },
  { spanish:"vosotros", english:"You (pl.)" },
  { spanish:"ellos", english:"They" }
];

const tenses = {
  present: {
    endings:{
      ar:["o","as","a","amos","áis","an"],
      er:["o","es","e","emos","éis","en"],
      ir:["o","es","e","imos","ís","en"]
    },
    irregulars:{
      ir:["voy","vas","va","vamos","vais","van"],
      ser:["soy","eres","es","somos","sois","son"],
      estar:["estoy","estás","está","estamos","estáis","están"],
      ver:["veo","ves","ve","vemos","veis","ven"],
      tener:["tengo","tienes","tiene","tenemos","tenéis","tienen"],
      hacer:["hago","haces","hace","hacemos","hacéis","hacen"],
      venir:["vengo","vienes","viene","venimos","venís","vienen"],
      decir:["digo","dices","dice","decimos","decís","dicen"]
    }
  },

  imperfect: {
    endings:{
      ar:["aba","abas","aba","ábamos","abais","aban"],
      er:["ía","ías","ía","íamos","íais","ían"],
      ir:["ía","ías","ía","íamos","íais","ían"]
    },
    irregulars:{
      ir:["iba","ibas","iba","íbamos","ibais","iban"],
      ser:["era","eras","era","éramos","erais","eran"],
      estar:["estaba","estabas","estaba","estábamos","estabais","estaban"],
      ver:["veía","veías","veía","veíamos","veíais","veían"]
    }
  },

  preterite: {
    endings:{
      ar:["é","aste","ó","amos","asteis","aron"],
      er:["í","iste","ió","imos","isteis","ieron"],
      ir:["í","iste","ió","imos","isteis","ieron"]
    },
    irregulars:{
      ir:["fui","fuiste","fue","fuimos","fuisteis","fueron"],
      ser:["fui","fuiste","fue","fuimos","fuisteis","fueron"],
      estar:["estuve","estuviste","estuvo","estuvimos","estuvisteis","estuvieron"],
      ver:["vi","viste","vio","vimos","visteis","vieron"],
      tener:["tuve","tuviste","tuvo","tuvimos","tuvisteis","tuvieron"],
      hacer:["hice","hiciste","hizo","hicimos","hicisteis","hicieron"],
      venir:["vine","viniste","vino","vinimos","vinisteis","vinieron"],
      decir:["dije","dijiste","dijo","dijimos","dijisteis","dijeron"]
    }
  }
};

const englishTenses = {
  ser:{
    present:["am","are","is","are","are","are"],
    imperfect:["was (ongoing identity)","were (ongoing identity)","was (ongoing identity)","were (ongoing identity)","were (ongoing identity)","were (ongoing identity)"],
    preterite:["was (completed event)","were (completed event)","was (completed event)","were (completed event)","were (completed event)","were (completed event)"]
  },

  estar:{
    present:["am (state/location)","are (state/location)","is (state/location)","are (state/location)","are (state/location)","are (state/location)"],
    imperfect:["was (ongoing state)","were (ongoing state)","was (ongoing state)","were (ongoing state)","were (ongoing state)","were (ongoing state)"],
    preterite:["was (temporary, completed)","were (temporary, completed)","was (temporary, completed)","were (temporary, completed)","were (temporary, completed)","were (temporary, completed)"]
  }
};

// Regular verbs reuse the same pattern
["hablar","comer","vivir","ir","ver","tener","hacer","venir","decir"].forEach(v=>{
  if(!englishTenses[v]){
    englishTenses[v]={
      present:["","","","","",""],
      imperfect:["was ___ing (ongoing)","were ___ing (ongoing)","was ___ing (ongoing)","were ___ing (ongoing)","were ___ing (ongoing)","were ___ing (ongoing)"],
      preterite:["___ (completed)","___ (completed)","___ (completed)","___ (completed)","___ (completed)","___ (completed)"]
    };
  }
});

// ---------------- LOGIC ----------------

function randomItem(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function removeAccents(str){ return str.normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

function conjugate(verb, tense, person){
  if(tenses[tense].irregulars[verb.infinitive])
    return tenses[tense].irregulars[verb.infinitive][person];
  return verb.infinitive.slice(0,-2) + tenses[tense].endings[verb.type][person];
}

// ---------------- SPEECH ----------------

function speakSpanish(text){
  if(!("speechSynthesis" in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "es-ES";
  window.speechSynthesis.speak(u);
}

// ---------------- SESSION ----------------

let currentQuestion=null, correct=0, total=0, limit=20;

function updateScore(){
  score.innerText=`Score: ${correct}/${total}`;
}

function newQuestion(){
  if(total>=limit){
    prompt.innerText="Session finished";
    answer.style.display="none";
    document.querySelectorAll("button").forEach(b=>b.style.display="none");
    feedback.innerText=`Final score: ${correct}/${limit}`;
    return;
  }

  const verb=randomItem(verbs);
  const tense=randomItem(Object.keys(tenses));
  const p=Math.floor(Math.random()*6);

  const tenseLabel={
    present:"[Present]",
    imperfect:"[Imperfect – ongoing/habitual]",
    preterite:"[Preterite – completed]"
  };

  const eng = `${tenseLabel[tense]} ${pronouns[p].english} ${englishTenses[verb.infinitive][tense][p]}`;
  const answerCorrect = conjugate(verb,tense,p);

  currentQuestion={answerCorrect};
  prompt.innerText=eng;
  answer.value="";
  feedback.innerText="";
  updateScore();
}

function checkAnswer(){
  const input=removeAccents(answer.value.trim().toLowerCase());
  const correctForm=removeAccents(currentQuestion.answerCorrect);

  total++;
  if(input.endsWith(correctForm)){
    correct++;
    feedback.innerText="Correct!";
  } else {
    feedback.innerText=`Incorrect. Correct: ${currentQuestion.answerCorrect}`;
  }

  speakSpanish(currentQuestion.answerCorrect);
  updateScore();
  setTimeout(newQuestion,1200);
}

answer.addEventListener("keydown",e=>{ if(e.key==="Enter") checkAnswer(); });
newQuestion();
</script>

</body>
</html>
