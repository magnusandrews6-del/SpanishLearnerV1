<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Spanish Conjugation Trainer</title>

<style>
  body {
    font-family: Arial;
    padding: 10px;
    max-width: 600px;
    margin: auto;
    color: #FFFFFF;
    background-color: #151B45;
  }
  h1 { text-align: center; }
  input { padding: 10px; font-size: 18px; width: 100%; box-sizing: border-box;} 
  button { padding: 10px; font-size: 18px; margin-top: 10px; }
  #feedback { margin-top: 10px; font-weight: bold; }
  #score { font-weight: bold; }
</style>
</head>

<body>

<h1>Spanish Conjugation Trainer</h1>
<p id="prompt"></p>

<input id="answer" type="text" autocomplete="off">
<p id="score">Score: 0/0</p>

<button onclick="checkAnswer()">Submit</button>
<p id="feedback"></p>

<script>
// ------------------ VERBS ------------------
const verbs = [
  { infinitive:"hablar", type:"ar" },
  { infinitive:"comer", type:"er" },
  { infinitive:"vivir", type:"ir" },
  { infinitive:"ir", type:"ir" },
  { infinitive:"ser", type:"ir" },
  { infinitive:"estar", type:"ar" },
  { infinitive:"ver", type:"er" },
  { infinitive:"tener", type:"er" },
  { infinitive:"hacer", type:"er" },
  { infinitive:"venir", type:"ir" },
  { infinitive:"decir", type:"ir" }
];

// ------------------ TENSES ------------------
const tenses = {
  present: {
    endings: {
      ar:["o","as","a","amos","áis","an"],
      er:["o","es","e","emos","éis","en"],
      ir:["o","es","e","imos","ís","en"]
    },
    irregulars: {
      ir:["voy","vas","va","vamos","vais","van"],
      ser:["soy","eres","es","somos","sois","son"],
      estar:["estoy","estás","está","estamos","estáis","están"],
      tener:["tengo","tienes","tiene","tenemos","tenéis","tienen"],
      hacer:["hago","haces","hace","hacemos","hacéis","hacen"],
      venir:["vengo","vienes","viene","venimos","venís","vienen"],
      decir:["digo","dices","dice","decimos","decís","dicen"]
    }
  },
  imperfect: {
    endings: {
      ar:["aba","abas","aba","ábamos","abais","aban"],
      er:["ía","ías","ía","íamos","íais","ían"],
      ir:["ía","ías","ía","íamos","íais","ían"]
    },
    irregulars: {
      ir:["iba","ibas","iba","íbamos","ibais","iban"],
      ser:["era","eras","era","éramos","erais","eran"],
      estar:["estaba","estabas","estaba","estábamos","estabais","estaban"],
      ver:["veía","veías","veía","veíamos","veíais","veían"]
    }
  },
  preterite: {
    endings: {
      ar:["é","aste","ó","amos","asteis","aron"],
      er:["í","iste","ió","imos","isteis","ieron"],
      ir:["í","iste","ió","imos","isteis","ieron"]
    },
    irregulars: {
      ir:["fui","fuiste","fue","fuimos","fuisteis","fueron"],
      ser:["fui","fuiste","fue","fuimos","fuisteis","fueron"],
      estar:["estuve","estuviste","estuvo","estuvimos","estuvisteis","estuvieron"],
      ver:["vi","viste","vio","vimos","visteis","vieron"],
      tener:["tuve","tuviste","tuvo","tuvimos","tuvisteis","tuvieron"],
      hacer:["hice","hiciste","hizo","hicimos","hicisteis","hicieron"],
      venir:["vine","viniste","vino","vinimos","vinisteis","vinieron"],
      decir:["dije","dijiste","dijo","dijimos","dijisteis","dijeron"]
    }
  }
};

// ------------------ PRONOUNS ------------------
const pronouns = ["I","You","He/She","We","You (pl.)","They"];

// ------------------ ENGLISH PROMPTS ------------------
const englishPrompts = {
  default: {
    present:["","", "s","","",""],
    imperfect:["was doing","were doing","was doing","were doing","were doing","were doing"],
    preterite:["did","did","did","did","did","did"]
  },
  ser: {
    imperfect:["was (description)","were (description)","was (description)","were (description)","were (description)","were (description)"],
    preterite:["was (what happened)","were (what happened)","was (what happened)","were (what happened)","were (what happened)","were (what happened)"]
  },
  estar: {
    imperfect:["was (feeling / location)","were (feeling / location)","was (feeling / location)","were (feeling / location)","were (feeling / location)","were (feeling / location)"],
    preterite:["was (temporary state)","were (temporary state)","was (temporary state)","were (temporary state)","were (temporary state)","were (temporary state)"]
  }
};

// ------------------ UTILS ------------------
function randomItem(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function removeAccents(s){ return s.normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

// ------------------ CONJUGATE ------------------
function conjugate(verb, tense, person){
  if(tenses[tense].irregulars[verb.infinitive])
    return tenses[tense].irregulars[verb.infinitive][person];
  const stem = verb.infinitive.slice(0,-2);
  return stem + tenses[tense].endings[verb.type][person];
}

// ------------------ SESSION ------------------
let currentQuestion = null;
let correct = 0;
let total = 0;

// ------------------ NEW QUESTION ------------------
function newQuestion(){
  const verb = randomItem(verbs);
  const tense = randomItem(Object.keys(tenses));
  const person = Math.floor(Math.random()*6);

  let englishVerb = englishPrompts.default[tense]?.[person] || "";

  if(englishPrompts[verb.infinitive]?.[tense])
    englishVerb = englishPrompts[verb.infinitive][tense][person];

  const english = `${pronouns[person]} ${englishVerb}`.trim();
  const answer = conjugate(verb, tense, person);

  currentQuestion = { answer };
  document.getElementById("prompt").innerText = english;
  document.getElementById("answer").value = "";
  document.getElementById("feedback").innerText = "";
  document.getElementById("score").innerText = `Score: ${correct}/${total}`;
}

// ------------------ CHECK ------------------
function checkAnswer(){
  const input = removeAccents(document.getElementById("answer").value.trim().toLowerCase());
  const correctAnswer = removeAccents(currentQuestion.answer);

  total++;
  if(input === correctAnswer){
    correct++;
    document.getElementById("feedback").innerText = "Correct!";
  } else {
    document.getElementById("feedback").innerText = `Incorrect: ${currentQuestion.answer}`;
  }
  setTimeout(newQuestion,1200);
}

document.getElementById("answer").addEventListener("keydown",e=>{
  if(e.key==="Enter") checkAnswer();
});

// START
newQuestion();
</script>

</body>
</html>
