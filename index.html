<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Spanish Conjugation Trainer</title>
<style>
  body {
    font-family: Arial;
    padding: 10px;
    max-width: 600px;
    margin: auto;
    -webkit-text-size-adjust: 100%;
    color: #FFFFFF;
    background-color: #151B45;
  }
  h1 { text-align: center; }
  #input-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
  }
  input {
    padding: 10px;
    font-size: 18px;
    width: 100%;
    box-sizing: border-box;
  }
  button {
    padding: 10px 20px;
    font-size: 18px;
    margin-top: 10px;
  }
  #feedback { margin-top: 10px; font-weight: bold; }
  #score { font-weight: bold; white-space: nowrap; margin: 0; }
</style>
</head>

<body>

<h1>Spanish Conjugation Trainer</h1>
<p id="prompt"></p>

<div id="input-container">
  <input id="answer" type="text" autocomplete="off">
  <p id="score">Score: 0/0</p>
</div>

<button type="button" onclick="speakSpanish(currentQuestion.correctAnswer)">🔊 Listen</button>
<button onclick="checkAnswer()">Submit</button>
<p id="feedback"></p>

<script>
// --- Data ---
const verbs = [
  { infinitive: "hablar", type: "ar", english: "speak" },
  { infinitive: "comer", type: "er", english: "eat" },
  { infinitive: "vivir", type: "ir", english: "live" },
  { infinitive: "ir", type: "ir", english: "go" },
  { infinitive: "ser", type: "ir", english: "be (identity)" },
  { infinitive: "estar", type: "ar", english: "be (state/location)" },
  { infinitive: "ver", type: "er", english: "see" },
  { infinitive: "tener", type: "er", english: "have" },
  { infinitive: "hacer", type: "er", english: "do/make" },
  { infinitive: "venir", type: "ir", english: "come" },
  { infinitive: "decir", type: "ir", english: "say/tell" }
];

const tenses = {
  present: {
    endings: { ar:["o","as","a","amos","áis","an"], er:["o","es","e","emos","éis","en"], ir:["o","es","e","imos","ís","en"] },
    irregulars: {
      ir:["voy","vas","va","vamos","vais","van"],
      ser:["soy","eres","es","somos","sois","son"],
      estar:["estoy","estás","está","estamos","estáis","están"],
      ver:["veo","ves","ve","vemos","veis","ven"],
      tener:["tengo","tienes","tiene","tenemos","tenéis","tienen"],
      hacer:["hago","haces","hace","hacemos","hacéis","hacen"],
      venir:["vengo","vienes","viene","venimos","venís","vienen"],
      decir:["digo","dices","dice","decimos","decís","dicen"]
    }
  },
  imperfect: {
    endings: { ar:["aba","abas","aba","ábamos","abais","aban"], er:["ía","ías","ía","íamos","íais","ían"], ir:["ía","ías","ía","íamos","íais","ían"] },
    irregulars: {
      ir:["iba","ibas","iba","íbamos","ibais","iban"],
      ser:["era","eras","era","éramos","erais","eran"],
      estar:["estaba","estabas","estaba","estábamos","estabais","estaban"],
      ver:["veía","veías","veía","veíamos","veíais","veían"]
    }
  },
  preterite: {
    endings: { ar:["é","aste","ó","amos","asteis","aron"], er:["í","iste","ió","imos","isteis","ieron"], ir:["í","iste","ió","imos","isteis","ieron"] },
    irregulars: {
      ir:["fui","fuiste","fue","fuimos","fuisteis","fueron"],
      ser:["fui","fuiste","fue","fuimos","fuisteis","fueron"],
      estar:["estuve","estuviste","estuvo","estuvimos","estuvisteis","estuvieron"],
      ver:["vi","viste","vio","vimos","visteis","vieron"],
      tener:["tuve","tuviste","tuvo","tuvimos","tuvisteis","tuvieron"],
      hacer:["hice","hiciste","hizo","hicimos","hicisteis","hicieron"],
      venir:["vine","viniste","vino","vinimos","vinisteis","vinieron"],
      decir:["dije","dijiste","dijo","dijimos","dijisteis","dijeron"]
    }
  }
};

const pronouns = [
  { spanish:"yo", english:"I" },
  { spanish:"tú", english:"You (sing.)" },
  { spanish:"él/ella", english:"He/She" },
  { spanish:"nosotros", english:"We" },
  { spanish:"vosotros", english:"You (pl.)" },
  { spanish:"ellos", english:"They" }
];

// --- English tenses ---
const englishTenses = {
  hablar:{
    present:["speak","speak","speaks","speak","speak","speak"],
    imperfect:["was speaking","were speaking","was speaking","were speaking","were speaking","were speaking"],
    preterite:["spoke","spoke","spoke","spoke","spoke","spoke"]
  },
  comer:{
    present:["eat","eat","eats","eat","eat","eat"],
    imperfect:["was eating","were eating","was eating","were eating","were eating","were eating"],
    preterite:["ate","ate","ate","ate","ate","ate"]
  },
  vivir:{
    present:["live","live","lives","live","live","live"],
    imperfect:["was living","were living","was living","were living","were living","were living"],
    preterite:["lived","lived","lived","lived","lived","lived"]
  },
  ir:{
    present:["go","go","goes","go","go","go"],
    imperfect:["was going (ongoing)","were going (ongoing)","was going (ongoing)","were going (ongoing)","were going (ongoing)","were going (ongoing)"],
    preterite:["went","went","went","went","went","went"]
  },
  ser:{
    present:["am (identity)","are (identity)","is (identity)","are (identity)","are (identity)","are (identity)"],
    imperfect:["was (ongoing identity)","were (ongoing identity)","was (ongoing identity)","were (ongoing identity)","were (ongoing identity)","were (ongoing identity)"],
    preterite:["was (completed identity)","were (completed identity)","was (completed identity)","were (completed identity)","were (completed identity)","were (completed identity)"]
  },
  estar:{
    present:["am (state/location)","are (state/location)","is (state/location)","are (state/location)","are (state/location)","are (state/location)"],
    imperfect:["was (ongoing state/location)","were (ongoing state/location)","was (ongoing state/location)","were (ongoing state/location)","were (ongoing state/location)","were (ongoing state/location)"],
    preterite:["was (completed state/location)","were (completed state/location)","was (completed state/location)","were (completed state/location)","were (completed state/location)","were (completed state/location)"]
  },
  ver:{
    present:["see","see","sees","see","see","see"],
    imperfect:["was seeing (ongoing)","were seeing (ongoing)","was seeing (ongoing)","were seeing (ongoing)","were seeing (ongoing)","were seeing (ongoing)"],
    preterite:["saw","saw","saw","saw","saw","saw"]
  },
  tener:{
    present:["have","have","has","have","have","have"],
    imperfect:["was having (ongoing)","were having (ongoing)","was having (ongoing)","were having (ongoing)","were having (ongoing)","were having (ongoing)"],
    preterite:["had","had","had","had","had","had"]
  },
  hacer:{
    present:["do","do","does","do","do","do"],
    imperfect:["was doing (ongoing)","were doing (ongoing)","was doing (ongoing)","were doing (ongoing)","were doing (ongoing)","were doing (ongoing)"],
    preterite:["did","did","did","did","did","did"]
  },
  venir:{
    present:["come","come","comes","come","come","come"],
    imperfect:["was coming (ongoing)","were coming (ongoing)","was coming (ongoing)","were coming (ongoing)","were coming (ongoing)","were coming (ongoing)"],
    preterite:["came","came","came","came","came","came"]
  },
  decir:{
    present:["say","say","says","say","say","say"],
    imperfect:["was saying (ongoing)","were saying (ongoing)","was saying (ongoing)","were saying (ongoing)","were saying (ongoing)","were saying (ongoing)"],
    preterite:["said","said","said","said","said","said"]
  }
};

// --- Utilities ---
function randomItem(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function removeAccents(str){ return str.normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

// --- Conjugation ---
function conjugate(verb, tenseName, personIndex){
  const tense = tenses[tenseName];
  if(tense.irregulars[verb.infinitive]) return tense.irregulars[verb.infinitive][personIndex];
  const stem = verb.infinitive.slice(0,-2);
  return stem + tense.endings[verb.type][personIndex];
}

// --- Speech synthesis ---
function speakSpanish(text){
  if('speechSynthesis' in window){
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'es-ES';
    window.speechSynthesis.speak(utterance);
  }
}

// --- Session ---
let currentQuestion=null, sessionCorrect=0, sessionCount=0, sessionTotal=20;

function updateScore(){
  score.innerText=`Score: ${sessionCorrect}/${sessionCount}`;
}

function newQuestion(){
  if(sessionCount>=sessionTotal){
    prompt.innerText="Session finished";
    answer.style.display="none";
    document.querySelectorAll("button").forEach(b=>b.style.display="none");
    feedback.innerText=`Final score: ${sessionCorrect}/${sessionTotal}`;
    return;
  }

  const verb=randomItem(verbs);
  const tenseName=randomItem(Object.keys(tenses));
  const personIndex=Math.floor(Math.random()*pronouns.length);

  const english = pronouns[personIndex].english + " " +
    englishTenses[verb.infinitive][tenseName][personIndex];

  currentQuestion={
    correctAnswer: conjugate(verb,tenseName,personIndex)
  };

  prompt.innerText=english;
  answer.value="";
  feedback.innerText="";
  updateScore();
}

function checkAnswer(){
  const input=removeAccents(answer.value.trim().toLowerCase());
  const correct=removeAccents(currentQuestion.correctAnswer);

  sessionCount++;
  if(input===correct){
    sessionCorrect++;
    feedback.innerText="Correct!";
  } else {
    feedback.innerText=`Incorrect. Correct: ${currentQuestion.correctAnswer}`;
  }

  speakSpanish(currentQuestion.correctAnswer);
  updateScore();
  setTimeout(newQuestion,1500);
}

answer.addEventListener("keydown",e=>{
  if(e.key==="Enter") checkAnswer();
});

newQuestion();
</script>

</body>
</html>
